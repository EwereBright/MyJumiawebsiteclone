<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumia Nigeria | Shop Online</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Top Promo Banner -->
    <div class="top-promo" style="background:#b077d9; text-align:center; padding:8px 0;">
        <img src="NEXUS-TW-BD_Desktop_top-strip.gif" alt="Promo" style="max-width:100%; height:auto;">
    </div>

    <!-- Top Black Bar -->
    <div class="top-bar">
        <div class="container">
            <a href="#" class="sell-link"><i class="fas fa-star"></i> Sell on Jumia</a>
            <div class="top-slider">
                <div class="top-slide active">Enjoy Free Delivery on Jumia</div>
                <div class="top-slide">100% Secure Shopping</div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <span class="logo-main">JUMIA</span>
                    <span class="logo-tagline">Nigeria</span>
                </a>

                <div class="search-wrapper">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products, brands and categories">
                    </div>
                </div>

                <div class="header-actions">
                    <a href="#" class="action-item"><i class="far fa-user"></i></a>
                    <a href="cart.html" class="action-item cart-action">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                </div>

                <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <!-- Desktop Nav -->
    <nav class="main-nav">
        <div class="container">
            <ul class="nav-links">
                <li><a href="#">Supermarket</a></li>
                <li><a href="#">Phones & Tablets</a></li>
                <li><a href="#">Fashion</a></li>
                <li><a href="#">Electronics</a></li>
                <li><a href="#">Home & Kitchen</a></li>
            </ul>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-overlay" id="mobileOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <button class="close-mobile" id="closeMobile">✕</button>
        <h3>Categories</h3>
        <!-- Add your categories here if needed -->
    </div>

    <!-- Hero Slider -->
    <section class="hero-section">
        <div class="main-slider" id="sliderWrapper">
            <div class="slide active"><img src="Artboard_1.jpg" alt="Banner"></div>
            <div class="slide"><img src="Artboard2.jpg" alt="Banner"></div>
            <div class="slide"><img src="Artboard 3.jpg" alt="Banner"></div>
            <div class="slide"><img src="Artboard 4.jpg" alt="Banner"></div>
        </div>
        <button class="slider-nav prev" id="sliderPrev">‹</button>
        <button class="slider-nav next" id="sliderNext">›</button>
    </section>

    <!-- Flash Sales -->
    <section class="flash-sales">
        <div class="container">
            <div class="section-header">
                <h2>🔥 Flash Sales</h2>
                <div class="countdown" id="countdown">
                    <span id="hours">04</span>h : 
                    <span id="minutes">32</span>m : 
                    <span id="seconds">15</span>s
                </div>
            </div>
            <div class="flash-products" id="flashProducts">
                <!-- Products populated by JS -->
            </div>
        </div>
    </section>

    <!-- Top Selling -->
    <section class="top-selling">
        <div class="container">
            <h2 class="section-title">Top Selling</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products populated by JS -->
            </div>
        </div>
    </section>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <a href="#" class="bottom-nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="#" onclick="toggleMobileMenu()" class="bottom-nav-item"><i class="fas fa-th-large"></i><span>Categories</span></a>
        <a href="#" class="bottom-nav-item"><i class="fas fa-fire"></i><span>Deals</span></a>
        <a href="cart.html" class="bottom-nav-item"><i class="fas fa-shopping-cart"></i><span>Cart</span></a>
        <a href="#" class="bottom-nav-item"><i class="far fa-user"></i><span>Account</span></a>
    </nav>

    <script src="Scripts.js"></script>
    <script src="products-data.js"></script>
</body>
</html>
